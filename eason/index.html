<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Eason Chang · Solution Architect</title>
<style>
  :root{
    --ink:#0a0a0a; --line:#5b21b6; --muted:#6b7280; --card:#ffffff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(circle at 50% 0%,#1f2937 0%,#0b0f17 60%);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;color:var(--ink);
  }
  .card{
    width:100%;max-width:400px;background:var(--card);border-radius:22px;overflow:hidden;
    box-shadow:0 24px 60px rgba(0,0,0,.45);
  }
  .header{
    background:#0a0a0a;padding:38px 24px 30px;display:flex;align-items:center;justify-content:center;position:relative;
  }
  .header img{width:120px;height:auto;display:block;filter:drop-shadow(0 0 14px rgba(124,58,237,.35))}
  .body{padding:26px 26px 30px}
  .ident{position:relative;padding-left:18px;margin-bottom:24px}
  .ident::before{
    content:"";position:absolute;left:0;top:4px;bottom:4px;width:4px;border-radius:4px;
    background:linear-gradient(180deg,#7c3aed,#3b82f6);
  }
  .name{font-size:27px;font-weight:800;letter-spacing:.3px;line-height:1.15}
  .title{font-size:15px;color:#374151;margin-top:4px;font-weight:600}
  .org{font-size:14px;color:#111827;margin-top:14px;font-weight:600}
  .addr{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.5}
  .actions{display:flex;flex-direction:column;gap:11px}
  .btn{
    display:flex;align-items:center;gap:13px;width:100%;border:none;cursor:pointer;
    padding:14px 16px;border-radius:13px;font-size:15px;font-weight:600;text-decoration:none;
    transition:transform .08s ease, box-shadow .2s ease;
  }
  .btn:active{transform:scale(.98)}
  .btn .ic{width:22px;height:22px;flex:0 0 22px;display:flex;align-items:center;justify-content:center}
  .btn-primary{background:#0a0a0a;color:#fff;box-shadow:0 8px 20px rgba(0,0,0,.25)}
  .btn .sub{font-size:11px;font-weight:500;opacity:.75;display:block;margin-top:1px}
  .btn-line{background:#06C755;color:#fff;box-shadow:0 8px 20px rgba(6,199,85,.28)}
  .btn-ghost{background:#f3f4f6;color:#111827}
  .btn-ghost .val{margin-left:auto;font-size:13px;color:var(--muted);font-weight:500}
  .qr{margin-top:26px;text-align:center;border-top:1px solid #eef0f3;padding-top:22px}
  .qr img{width:128px;height:128px;border-radius:10px}
  .qr p{font-size:11px;color:var(--muted);margin-top:9px;letter-spacing:.3px}
  .foot{text-align:center;font-size:10px;color:#9ca3af;padding:14px}
  svg{display:block}
</style>
</head>
<body>
  <main class="card">
    <div class="header">
      <img src="logo.png" alt="Big Data IoT Technology logo">
    </div>
    <div class="body">
      <div class="ident">
        <div class="name">Eason Chang</div>
        <div class="title">Solution Architect</div>
        <div class="org">Big Data IoT Technology Co., Ltd.</div>
        <div class="addr">No. 36, Huaxia 1st Village, Zhongli District,<br>Taoyuan City 320018, Taiwan</div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="saveBtn">
          <span class="ic">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
          </span>
          <span>Save Contact<span class="sub">儲存到通訊錄</span></span>
        </button>

        <a class="btn btn-line" href="https://line.me/ti/p/QGxDIrOY4a">
          <span class="ic">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
          </span>
          <span>加 LINE 好友<span class="sub">Add me on LINE</span></span>
        </a>

        <a class="btn btn-ghost" href="tel:+886919302160">
          <span class="ic">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          </span>
          <span>Mobile</span>
          <span class="val">+886 919 302 160</span>
        </a>
      </div>

      <div class="qr">
        <img src="qr.png" alt="QR code to this card">
        <p>SCAN TO OPEN · 掃描開啟名片</p>
      </div>
    </div>
    <div class="foot">Digital business card</div>
  </main>

<script>
  var vcard = [
    "BEGIN:VCARD",
    "VERSION:3.0",
    "N:Chang;Eason;;;",
    "FN:Eason Chang",
    "ORG:Big Data IoT Technology Co.\\, Ltd.",
    "TITLE:Solution Architect",
    "TEL;TYPE=CELL,VOICE:+886919302160",
    "URL:https://line.me/ti/p/QGxDIrOY4a",
    "ADR;TYPE=WORK:;;No. 36\\, Huaxia 1st Village\\, Zhongli District;Taoyuan City;;320018;Taiwan",
    "END:VCARD"
  ].join("\r\n");

  document.getElementById("saveBtn").addEventListener("click", function(){
    var blob = new Blob([vcard], {type:"text/vcard;charset=utf-8"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = "Eason_Chang.vcf";
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1500);
  });
</script>
</body>
</html>
